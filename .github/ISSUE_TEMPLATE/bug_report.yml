name: Bug Report
description: Report something that isn't working correctly
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Affected Component
      options:
        - collectors
        - alerts
        - dashboard
        - tessera
        - cli
        - console
        - dynamics
        - insights
        - reference
        - other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: NØMAD Version
      description: "Run `nomad --version` or `pip show nomad-hpc`"
      placeholder: "e.g., 1.3.0"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Run `nomad ...`
        2. Navigate to ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: textarea
    id: system-info
    attributes:
      label: System Information
      description: "Paste the output of `nomad issue info` here"
      render: shell
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, config snippets, etc.
    validations:
      required: false
