name: Question
description: Ask about usage, behavior, or best practices
title: "[Question] "
labels: ["question"]
body:
  - type: dropdown
    id: topic
    attributes:
      label: Topic Area
      options:
        - collectors
        - alerts
        - dashboard
        - tessera
        - cli
        - console
        - dynamics
        - insights
        - reference
        - configuration
        - deployment
        - other
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: Question
      description: What would you like to know?
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: What I've Already Tried
      description: "Documentation, commands, or approaches you've tried"
    validations:
      required: false

  - type: textarea
    id: system-info
    attributes:
      label: System Information
      description: "If relevant, paste the output of `nomad issue info`"
      render: shell
    validations:
      required: false
